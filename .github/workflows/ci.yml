name: CI

on:
  push:
    branches: [main, l5-full-repair]
  pull_request:
    branches: [main, l5-full-repair]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Secret scan (gitleaks)
        if: success()
        run: |
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --config .gitleaks.toml --verbose --no-git
          else
            echo "gitleaks not installed, skipping"
          fi
